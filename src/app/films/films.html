<div class="container">
  <div class="card shadow mb-4">
    <div class="card-body">
      <table class="table table-striped">
        <tr>
          <th>Id</th>
          <th>Nom</th>
          <th>Prix</th>
          <th>Date Création</th>
        </tr>
        @for (film of films; track film.idFilm) {
          <tbody>
            <tr>
              <td>{{ film.idFilm }}</td>
              <td>{{ film.nomFilm }}</td>
              <td>{{ film.prixFilm }}</td>
              <td>{{ film.dateCreation | date:'dd/MM/yyyy' }}</td>
              <td><a class="btn btn-danger" (click)="supprimerFilm(film)">Supprimer</a></td>
              <td><a class="btn btn-success" [routerLink]="['/updateFilm', film.idFilm]">Modifier</a></td>
            </tr>
          </tbody>
        }
      </table>
    </div>
  </div>
</div>
